<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恐贪温度计 · 2026-05-20</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #060b14;
  color: #cdd9e8;
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.hd {
  padding: 14px 28px;
  border-bottom: 1px solid #1a2838;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.hd-title { font-size: 18px; font-weight: 800; }
.hd-title .gold { color: #e3b341; }
.back-link {
  font-size: 12px; color: #546678;
  text-decoration: none;
  border: 1px solid #1a2838;
  border-radius: 20px;
  padding: 4px 12px;
  background: #0d1623;
  transition: color 0.2s, border-color 0.2s;
}
.back-link:hover { color: #cdd9e8; border-color: #2a3d54; }

/* MAIN */
.main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 40px;
  padding: 36px 32px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
}

/* GAUGE PANEL */
.gauge-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
#gauge-svg { display: block; width: 340px; }

.gauge-score {
  text-align: center;
}
.score-num {
  font-size: 72px;
  font-weight: 900;
  color: #e3b341;
  line-height: 1;
  text-shadow: 0 0 24px #e3b34144;
  display: block;
}
.score-zone {
  font-size: 20px;
  font-weight: 700;
  color: #e3b341;
  letter-spacing: 0.06em;
  margin: 4px 0 8px;
}
.score-delta {
  font-size: 12px;
  color: #546678;
}
.score-delta b { font-weight: 700; }

/* HISTORY BOX */
.history-box {
  width: 100%;
  background: #0a1325;
  border: 1px solid #1a2838;
  border-radius: 12px;
  padding: 14px 16px;
}
.hb-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #546678;
  margin-bottom: 10px;
}
.hb-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid #101e30;
  font-size: 11.5px;
}
.hb-row:last-child { border-bottom: none; }
.hb-cond { color: #546678; }
.hb-val  { font-weight: 700; }

/* COMPONENTS PANEL */
.comp-wrap { flex: 1; min-width: 0; }
.comp-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
}
.comp-sub {
  font-size: 11px;
  color: #546678;
  margin-bottom: 22px;
}
.comp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.cr-lbl { font-size: 12px; color: #546678; flex-shrink: 0; width: 76px; }
.cr-val { font-size: 14px; font-weight: 800; flex-shrink: 0; width: 28px; text-align: right; }
.cr-bar-bg {
  flex: 1;
  height: 6px;
  background: #1a2838;
  border-radius: 3px;
  overflow: hidden;
}
.cr-bar { height: 100%; border-radius: 3px; }
.cr-note { font-size: 10.5px; color: #546678; flex-shrink: 0; width: 100px; text-align: right; }

/* FOOTER */
.ft {
  padding: 12px 28px;
  border-top: 1px solid #1a2838;
  text-align: center;
  font-size: 11px;
  color: #374556;
}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-title">A股<span class="gold">恐贪</span>温度计 &nbsp;·&nbsp; 2026-05-20</div>
  <a href="index.html" class="back-link">← 返回象限图</a>
</div>

<div class="main">

  <!-- GAUGE -->
  <div class="gauge-wrap">
    <svg id="gauge-svg" viewBox="0 0 340 210"></svg>

    <div class="gauge-score">
      <span class="score-num">71</span>
      <div class="score-zone">贪婪</div>
      <div class="score-delta">昨日 <b>65</b> &nbsp;→&nbsp; 今日 <b style="color:#f59e0b">71</b> &nbsp;<b style="color:#f85149">+6 贪婪加剧</b></div>
    </div>

    <div class="history-box">
      <div class="hb-title">历史规律（2015–2026）</div>
      <div class="hb-row">
        <span class="hb-cond">指数 &gt; 75（极度贪婪）</span>
        <span class="hb-val" style="color:#f85149">持有一月  均 −4.1%</span>
      </div>
      <div class="hb-row">
        <span class="hb-cond">指数 55–75（贪婪）</span>
        <span class="hb-val" style="color:#f59e0b">持有一月  均 −2.3%</span>
      </div>
      <div class="hb-row">
        <span class="hb-cond">指数 &lt; 30（恐惧）</span>
        <span class="hb-val" style="color:#3fb950">持有一月  均 +5.8%</span>
      </div>
    </div>
  </div>

  <!-- COMPONENTS -->
  <div class="comp-wrap">
    <div class="comp-title">分项指标</div>
    <div class="comp-sub">综合得分 71 / 100</div>
    <div id="comp-rows"></div>
  </div>

</div>

<div class="ft">
  指标：RSI超买度 · 融资杠杆 · 成交热度 · 北向资金 · 市场广度 · 价格动量 · 波动率 &nbsp;·&nbsp;
  数据：Wind · 龙虎榜 · 仅供参考，不构成投资建议 · © Asymmetric IM
</div>

<script>
// ── GAUGE ─────────────────────────────────────────────────────────
const TODAY = 71;
const ns    = 'http://www.w3.org/2000/svg';
const gsvg  = document.getElementById('gauge-svg');
const CX = 170, CY = 168, OR = 138, IR = 82;

function angle(v) { return (195 - v/100*210) * Math.PI / 180; }
function pt(r, v) { const a = angle(v); return { x: CX + r*Math.cos(a), y: CY - r*Math.sin(a) }; }

function addArc(v0, v1, color) {
  const p1o = pt(OR,v0), p2o = pt(OR,v1);
  const p1i = pt(IR,v0), p2i = pt(IR,v1);
  const span = (v1-v0)/100*210;
  const lg   = span > 180 ? 1 : 0;
  const path = document.createElementNS(ns,'path');
  path.setAttribute('d',
    `M ${p1o.x} ${p1o.y} A ${OR} ${OR} 0 ${lg} 1 ${p2o.x} ${p2o.y}
     L ${p2i.x} ${p2i.y} A ${IR} ${IR} 0 ${lg} 0 ${p1i.x} ${p1i.y} Z`);
  path.setAttribute('fill', color); path.setAttribute('fill-opacity','0.9');
  path.setAttribute('stroke','#060b14'); path.setAttribute('stroke-width','1.5');
  gsvg.appendChild(path);
}

// Background
const bg = document.createElementNS(ns,'path');
const s0 = pt(OR,0), s100 = pt(OR,100), s0i = pt(IR,0), s100i = pt(IR,100);
bg.setAttribute('d', `M ${s0.x} ${s0.y} A ${OR} ${OR} 0 1 1 ${s100.x} ${s100.y}
  L ${s100i.x} ${s100i.y} A ${IR} ${IR} 0 1 0 ${s0i.x} ${s0i.y} Z`);
bg.setAttribute('fill','#101e2e'); gsvg.appendChild(bg);

// Segments
[[0,25,'#1d4ed8'],[25,45,'#0ea5e9'],[45,55,'#4b5563'],[55,75,'#f59e0b'],[75,100,'#dc2626']]
  .forEach(([v0,v1,c]) => addArc(v0,v1,c));

// Ticks
for (let v = 0; v <= 100; v += 10) {
  const major = v % 25 === 0;
  const r1 = major ? OR-10 : OR-6;
  const a  = angle(v);
  const tick = document.createElementNS(ns,'line');
  tick.setAttribute('x1', CX + r1*Math.cos(a));   tick.setAttribute('y1', CY - r1*Math.sin(a));
  tick.setAttribute('x2', CX + (OR+3)*Math.cos(a)); tick.setAttribute('y2', CY - (OR+3)*Math.sin(a));
  tick.setAttribute('stroke','#cdd9e8');
  tick.setAttribute('stroke-width', major ? '1.8' : '0.9');
  tick.setAttribute('stroke-opacity', major ? '0.55' : '0.25');
  gsvg.appendChild(tick);
  if (major) {
    const lr = OR + 16;
    const t = document.createElementNS(ns,'text');
    t.setAttribute('x', CX + lr*Math.cos(a)); t.setAttribute('y', CY - lr*Math.sin(a) + 4);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family','sans-serif'); t.setAttribute('font-size','11');
    t.setAttribute('fill','#546678'); t.textContent = v;
    gsvg.appendChild(t);
  }
}

// Zone labels
[[12,'极度恐惧','#60a5fa'],[35,'恐惧','#38bdf8'],[50,'中性','#6b7280'],
 [65,'贪婪','#fbbf24'],[88,'极度贪婪','#ef4444']]
.forEach(([v,txt,c]) => {
  const r = (OR+IR)/2, a = angle(v);
  const t = document.createElementNS(ns,'text');
  t.setAttribute('x', CX + r*Math.cos(a)); t.setAttribute('y', CY - r*Math.sin(a) + 4);
  t.setAttribute('text-anchor','middle');
  t.setAttribute('font-family','Microsoft YaHei,PingFang SC,sans-serif');
  t.setAttribute('font-size','9.5'); t.setAttribute('fill',c); t.setAttribute('fill-opacity','0.65');
  t.textContent = txt; gsvg.appendChild(t);
});

// Needle
const na = angle(TODAY);
const nx = CX + (OR-6)*Math.cos(na), ny = CY - (OR-6)*Math.sin(na);
const shadow = document.createElementNS(ns,'line');
shadow.setAttribute('x1',CX+1.5); shadow.setAttribute('y1',CY+1.5);
shadow.setAttribute('x2',nx+1.5); shadow.setAttribute('y2',ny+1.5);
shadow.setAttribute('stroke','#00000055'); shadow.setAttribute('stroke-width','5');
shadow.setAttribute('stroke-linecap','round'); gsvg.appendChild(shadow);
const needle = document.createElementNS(ns,'line');
needle.setAttribute('x1',CX); needle.setAttribute('y1',CY);
needle.setAttribute('x2',nx); needle.setAttribute('y2',ny);
needle.setAttribute('stroke','#f0f6fc'); needle.setAttribute('stroke-width','4');
needle.setAttribute('stroke-linecap','round'); gsvg.appendChild(needle);
[[8,'#f0f6fc'],[5,'#060b14'],[3,'#e3b341']].forEach(([r,c]) => {
  const ci = document.createElementNS(ns,'circle');
  ci.setAttribute('cx',CX); ci.setAttribute('cy',CY); ci.setAttribute('r',r); ci.setAttribute('fill',c);
  gsvg.appendChild(ci);
});

// ── COMPONENTS ────────────────────────────────────────────────────
const COMPS = [
  { label:'RSI超买度', val:79, note:'半导体 82.9',    color:'#dc2626' },
  { label:'融资杠杆',  val:82, note:'+1,295亿/月',    color:'#f59e0b' },
  { label:'成交热度',  val:75, note:'2.86万亿',        color:'#f59e0b' },
  { label:'北向资金',  val:58, note:'+35.3亿',         color:'#9ca3af' },
  { label:'市场广度',  val:62, note:'7/10板块正收益',  color:'#9ca3af' },
  { label:'价格动量',  val:65, note:'CSI300 +1.8%',   color:'#9ca3af' },
  { label:'波动率',    val:67, note:'VIX当量偏低',    color:'#9ca3af' },
];

const container = document.getElementById('comp-rows');
COMPS.forEach(c => {
  const row = document.createElement('div');
  row.className = 'comp-row';
  row.innerHTML = `
    <div class="cr-lbl">${c.label}</div>
    <div class="cr-val" style="color:${c.color}">${c.val}</div>
    <div class="cr-bar-bg">
      <div class="cr-bar" style="width:${c.val}%;background:linear-gradient(90deg,${c.color},${c.color}88)"></div>
    </div>
    <div class="cr-note">${c.note}</div>`;
  container.appendChild(row);
});
</script>
</body>
</html>
