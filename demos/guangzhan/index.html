<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你相信光吗？· A股资金博弈图 · Asymmetric IM</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #060b14;
  --bg2:     #090f1c;
  --card:    #0d1623;
  --border:  #1a2838;
  --fg:      #cdd9e8;
  --dim:     #546678;
  --gold:    #e3b341;
  --gold2:   #f5c843;
  --blue:    #4c9ef0;
  --green:   #3fb950;
  --red:     #f85149;
  --orange:  #f0883e;
  --purple:  #bc8cff;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  padding: 28px 36px 22px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #060b14 0%, #0c1628 100%);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.header::after {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 360px; height: 360px;
  background: radial-gradient(circle, #e3b34118 0%, transparent 65%);
  pointer-events: none;
}
.header-left { position: relative; z-index: 1; }
.header-tag {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  margin-bottom: 12px;
  background: var(--card);
}
.main-title {
  font-size: clamp(30px, 4.5vw, 50px);
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 8px;
}
.main-title .glow-char {
  color: var(--gold);
  text-shadow: 0 0 24px #e3b34166, 0 0 48px #e3b34130;
  display: inline-block;
  animation: gold-breathe 3s ease-in-out infinite;
}
@keyframes gold-breathe {
  0%,100% { text-shadow: 0 0 20px #e3b34155, 0 0 40px #e3b34120; }
  50%      { text-shadow: 0 0 32px #e3b34188, 0 0 64px #e3b34140; }
}
.header-sub {
  color: var(--dim);
  font-size: 13px;
  line-height: 1.55;
}

/* ── FEAR/GREED MINI BADGE ── */
.fg-badge {
  position: relative; z-index: 1;
  flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 18px 12px;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
  min-width: 120px;
}
.fg-badge:hover {
  border-color: var(--gold);
  box-shadow: 0 0 16px #e3b34120;
}
.fg-arc-svg {
  display: block;
  margin: 0 auto 8px;
  width: 72px; height: 42px;
  overflow: visible;
}
.fg-num {
  font-size: 26px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.fg-label {
  font-size: 11px;
  color: var(--dim);
  margin: 3px 0 6px;
  letter-spacing: 0.05em;
}
.fg-cta {
  font-size: 10.5px;
  color: var(--gold);
  opacity: 0.75;
}
.fg-cta:hover { opacity: 1; }

/* ── CHART WRAPPER ── */
.chart-wrapper {
  flex: 1;
  position: relative;
  min-height: 0;
  display: flex;
  overflow: hidden;
}
.chart-svg-wrap {
  flex: 1;
  min-width: 0;
  position: relative;
}
#main-chart {
  width: 100%;
  height: 100%;
  min-height: 520px;
}

/* ── SECTOR PANEL ── */
.sector-panel {
  width: 0;
  overflow: hidden;
  transition: width 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  background: var(--card);
  border-left: 1px solid var(--border);
  flex-shrink: 0;
}
.sector-panel.open { width: 310px; }
.panel-inner {
  width: 310px;
  height: 100%;
  overflow-y: auto;
  padding: 20px 18px 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.panel-close {
  position: sticky;
  top: 0;
  float: right;
  background: var(--border);
  border: none;
  color: var(--dim);
  font-size: 14px;
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 6px;
  margin-bottom: 8px;
  z-index: 10;
}
.panel-close:hover { color: var(--fg); background: #2a3545; }

.panel-qbadge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 10px;
  letter-spacing: 0.04em;
}
.panel-name {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 3px;
  line-height: 1.2;
}
.panel-ret {
  font-size: 13px;
  margin-bottom: 14px;
}
.panel-stats {
  display: flex;
  gap: 0;
  background: #0a1325;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 14px;
}
.stat-col {
  flex: 1;
  text-align: center;
  padding: 10px 6px;
}
.stat-col + .stat-col { border-left: 1px solid var(--border); }
.stat-lbl {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--dim);
  margin-bottom: 4px;
}
.stat-val {
  font-size: 17px;
  font-weight: 800;
  line-height: 1;
}
.stat-sub {
  font-size: 9px;
  color: var(--dim);
  margin-top: 3px;
}
.panel-desc {
  font-size: 12px;
  color: var(--dim);
  line-height: 1.65;
  padding: 11px 12px;
  background: #0a1325;
  border: 1px solid var(--border);
  border-radius: 9px;
  margin-bottom: 14px;
}
.section-hd {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 9px;
}
.stock-card {
  background: #0a1325;
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 11px 13px;
  margin-bottom: 7px;
  transition: border-color 0.18s;
}
.stock-card:hover { border-color: #2a3d54; }
.sc-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.sc-name { font-size: 13px; font-weight: 700; }
.sc-code {
  font-size: 10px;
  color: var(--dim);
  font-family: 'Courier New', monospace;
  background: #141f30;
  padding: 2px 6px;
  border-radius: 4px;
}
.sc-reason {
  font-size: 11.5px;
  color: var(--dim);
  line-height: 1.5;
  margin-bottom: 7px;
}
.sc-bar-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
}
.sc-bar-bg {
  flex: 1;
  height: 3px;
  background: #1a2838;
  border-radius: 2px;
  overflow: hidden;
}
.sc-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.sc-signal {
  font-size: 9.5px;
  font-weight: 700;
  white-space: nowrap;
  letter-spacing: 0.04em;
}
.panel-foot {
  margin-top: 14px;
  text-align: center;
  font-size: 10.5px;
  color: #374556;
  line-height: 1.6;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 36px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  font-size: 11.5px;
  color: var(--dim);
}
.legend-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 16px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
}
.leg-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.bottom-right {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.gauge-link {
  color: var(--gold);
  text-decoration: none;
  font-weight: 600;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
  border: 1px solid #e3b34140;
  padding: 5px 12px;
  border-radius: 20px;
  transition: background 0.2s, border-color 0.2s;
}
.gauge-link:hover { background: #e3b34115; border-color: var(--gold); }

/* SVG animations */
@keyframes dash-pulse {
  0%,100% { stroke-opacity: 0.28; }
  50%      { stroke-opacity: 0.72; }
}
.tl-dash { animation: dash-pulse 2.8s ease-in-out infinite; }

@keyframes sparkle {
  0%,100% { opacity: 0.5; r: 1.5; }
  50%      { opacity: 0.9; r: 2.5; }
}

/* Bubble hover handled in JS, but add cursor */
.s-bubble { cursor: pointer; }
</style>
</head>

<!-- HEADER -->
<div class="header">

// ── DATA ──────────────────────────────────────────────────────────
const SECTORS = [
  {

  buy:   { label: '推荐买入', color: '#3fb950' },
  watch: { label: '关注布局', color: '#e3b341' },
  sell:  { label: '建议减仓', color: '#f0883e' },

// ── COORDINATE TRANSFORM ──────────────────────────────────────────
const VB = { l: 100, r: 860, t: 62, b: 628 };
const CX = (VB.l + VB.r) / 2; // 480
const CY = (VB.t + VB.b) / 2; // 345
const XR = 0.54, YR = 0.48;

function toSVG(dx, dy) {
  return {
    x: VB.l + (dx + XR) / (2 * XR) * (VB.r - VB.l),
    y: VB.t + (1 - (dy + YR) / (2 * YR)) * (VB.b - VB.t),
  };
}

// ── RENDER BUBBLES ────────────────────────────────────────────────
const layer = document.getElementById('bubbles-layer');
const svgEl = document.getElementById('main-chart');
const defs  = svgEl.querySelector('defs');

SECTORS.forEach(s => {
  // Arrow marker per sector
  const mk = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  mk.setAttribute('id', 'arr-' + s.id);
  mk.setAttribute('markerWidth', '7'); mk.setAttribute('markerHeight', '7');
  mk.setAttribute('refX', '6'); mk.setAttribute('refY', '3');
  mk.setAttribute('orient', 'auto');
  const mkp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  mkp.setAttribute('d', 'M 0 0 L 7 3 L 0 6 Z');
  mkp.setAttribute('fill', s.color); mkp.setAttribute('opacity', '0.75');
  mk.appendChild(mkp); defs.appendChild(mk);

  const cur = toSVG(s.x, s.y);
  const old = toSVG(s.x - s.dx, s.y - s.dy);
  const r   = 20 + s.vol * 12;

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 's-bubble');
  g.addEventListener('click', () => openPanel(s));

  // Ghost dot
  const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  ghost.setAttribute('cx', old.x); ghost.setAttribute('cy', old.y);
  ghost.setAttribute('r', r * 0.32);
  ghost.setAttribute('fill', s.color); ghost.setAttribute('fill-opacity', '0.16');
  g.appendChild(ghost);

  // Trajectory line
  const dist = Math.hypot(cur.x - old.x, cur.y - old.y);
  if (dist > 5) {
    const shrink = r + 5;
    const t1 = 0.15, t2 = Math.max(0, (dist - shrink) / dist);
    const sx = old.x + (cur.x - old.x) * t1, sy = old.y + (cur.y - old.y) * t1;
    const ex = old.x + (cur.x - old.x) * t2, ey = old.y + (cur.y - old.y) * t2;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', sx); line.setAttribute('y1', sy);
    line.setAttribute('x2', ex); line.setAttribute('y2', ey);
    line.setAttribute('stroke', s.color); line.setAttribute('stroke-width', '1.8');
    line.setAttribute('stroke-opacity', '0.55');
    line.setAttribute('marker-end', 'url(#arr-' + s.id + ')');
    g.appendChild(line);
  }

  // Outer glow ring
  const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  glow.setAttribute('cx', cur.x); glow.setAttribute('cy', cur.y);
  glow.setAttribute('r', r * 1.5);
  glow.setAttribute('fill', s.color); glow.setAttribute('fill-opacity', '0.07');
  glow.id = 'glow-' + s.id;
  g.appendChild(glow);

  // Main bubble
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', cur.x); c.setAttribute('cy', cur.y); c.setAttribute('r', r);
  c.setAttribute('fill', s.color); c.setAttribute('fill-opacity', '0.88');
  c.setAttribute('stroke', s.color); c.setAttribute('stroke-width', '2.2');
  c.id = 'bbl-' + s.id;
  g.appendChild(c);

  // Sector name
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', cur.x); txt.setAttribute('y', cur.y + 4);
  txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('dominant-baseline', 'middle');
  txt.setAttribute('font-family', 'Microsoft YaHei,PingFang SC,sans-serif');
  txt.setAttribute('font-size', r > 30 ? '11' : '10');
  txt.setAttribute('font-weight', '800');
  txt.setAttribute('fill', '#ffffff'); txt.setAttribute('fill-opacity', '0.95');
  txt.setAttribute('pointer-events', 'none');
  txt.textContent = s.name;
  g.appendChild(txt);

  // Return label
  const ret = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  ret.setAttribute('x', cur.x); ret.setAttribute('y', cur.y + r + 13);
  ret.setAttribute('text-anchor', 'middle');
  ret.setAttribute('font-family', 'Microsoft YaHei,PingFang SC,sans-serif');
  ret.setAttribute('font-size', '9'); ret.setAttribute('font-weight', '700');
  ret.setAttribute('fill', s.ret5d >= 0 ? '#3fb950' : '#f85149');
  ret.setAttribute('pointer-events', 'none');
  ret.textContent = (s.ret5d >= 0 ? '+' : '') + s.ret5d + '%';
  g.appendChild(ret);

  // Hover
  g.addEventListener('mouseenter', () => {
    document.getElementById('bbl-' + s.id).setAttribute('fill-opacity', '1');
    const g2 = document.getElementById('glow-' + s.id);
    g2.setAttribute('fill-opacity', '0.16'); g2.setAttribute('r', r * 2.0);
  });
  g.addEventListener('mouseleave', () => {
    document.getElementById('bbl-' + s.id).setAttribute('fill-opacity', '0.88');
    const g2 = document.getElementById('glow-' + s.id);
    g2.setAttribute('fill-opacity', '0.07'); g2.setAttribute('r', r * 1.5);
  });

  layer.appendChild(g);
});

// ── PANEL ─────────────────────────────────────────────────────────
const panelEl   = document.getElementById('sector-panel');
const panelBody = document.getElementById('panel-content');

function openPanel(s) {
  const q = Q_CONFIG[s.quadrant];
  const stocksHTML = s.stocks.map(st => {
    const sig = SIG[st.signal];
    return `
    <div class="stock-card">
      <div class="sc-top">
        <span class="sc-name">${st.name}</span>
        <span class="sc-code">${st.code}</span>
      </div>
      <div class="sc-reason">${st.reason}</div>
      <div class="sc-bar-wrap">
        <div class="sc-bar-bg"><div class="sc-bar-fill" style="width:${st.strength}%;background:${sig.color}"></div></div>
        <span class="sc-signal" style="color:${sig.color}">${sig.label}</span>
      </div>
    </div>`;
  }).join('');

  const sectionLabel = ['buy','watch'].includes(s.stocks[0]?.signal) ? '今日推荐' : '今日避雷';
  const sectionColor = ['buy','watch'].includes(s.stocks[0]?.signal) ? '#3fb950' : '#f85149';

  panelBody.innerHTML = `
    <div style="margin-bottom:14px;">
      <span class="panel-qbadge" style="background:${q.bg};color:${q.color};border:1px solid ${q.border}">
        ${q.label}
      </span>
    </div>
    <div class="panel-name">${s.name}</div>
    <div class="panel-ret" style="color:${s.ret5d >= 0 ? '#3fb950' : '#f85149'}">
      5日涨跌幅：${s.ret5d >= 0 ? '+' : ''}${s.ret5d}%
    </div>
    <div class="panel-stats">
      <div class="stat-col">
        <div class="stat-lbl">机构强度</div>
        <div class="stat-val" style="color:${s.inst > 50 ? '#3fb950' : '#f0883e'}">${s.inst}%</div>
        <div class="stat-sub">${s.instDir}</div>
      </div>
      <div class="stat-col">
        <div class="stat-lbl">散户热度</div>
        <div class="stat-val" style="color:${s.retail > 55 ? '#f0883e' : '#546678'}">${s.retail}%</div>
        <div class="stat-sub">${s.retailDir}</div>
      </div>
    </div>
    <div class="panel-desc">${s.desc}</div>
    <div class="section-hd" style="color:${sectionColor}">${sectionLabel}</div>
    ${stocksHTML}
    <div class="panel-foot">
      数据：Wind · 龙虎榜 · 北向资金<br>
      仅供参考，不构成投资建议
    </div>`;

  panelEl.classList.add('open');
}

function closePanel() {
  panelEl.classList.remove('open');
}

svgEl.addEventListener('click', e => {
  if (!e.target.closest('.s-bubble')) closePanel();
});
