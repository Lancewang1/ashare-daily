<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你相信光吗？· A股资金博弈图</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #060b14;
  color: #cdd9e8;
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.hd {
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #1a2838;
  flex-shrink: 0;
}
.hd-title {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.01em;
}
.hd-title .glow {
  color: #e3b341;
  text-shadow: 0 0 20px #e3b34155;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { text-shadow: 0 0 16px #e3b34144; }
  50%      { text-shadow: 0 0 28px #e3b34177; }
}
.hd-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.hd-meta { font-size: 12px; color: #546678; }
.hd-fg {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #0d1623;
  border: 1px solid #1a2838;
  border-radius: 20px;
  padding: 5px 14px 5px 10px;
  font-size: 12px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s;
}
.hd-fg:hover { border-color: #e3b341; }
.fg-num { font-size: 16px; font-weight: 900; color: #e3b341; }
.fg-lbl { color: #546678; }
.hd-gauge-mini {
  width: 36px; height: 20px;
  overflow: visible;
}

/* CHART */
.chart-area {
  flex: 1;
  min-height: 0;
  position: relative;
}
#chart {
  width: 100%;
  height: 100%;
  display: block;
}

/* FOOTER */
.ft {
  padding: 8px 28px;
  border-top: 1px solid #1a2838;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.ft-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 14px;
}
.leg {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: #546678;
}
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ft-note { font-size: 11px; color: #374556; text-align: right; }

/* SVG animations */
@keyframes dash-pulse {
  0%,100% { stroke-opacity: 0.25; }
  50%      { stroke-opacity: 0.65; }
}
.tl-dash { animation: dash-pulse 2.8s ease-in-out infinite; }

.s-bubble { cursor: default; }
</style>
</head>
<body>

<div class="hd">
  <div class="hd-title">你相信<span class="glow">光</span>吗？</div>
  <div class="hd-right">
    <span class="hd-meta">机构 vs 散户 · 10大板块 · 2026-05-20</span>
    <a href="gauge.html" class="hd-fg">
      <svg class="hd-gauge-mini" viewBox="0 0 36 20">
        <path d="M 3 18 A 15 15 0 0 1 33 18" fill="none" stroke="#1a2838" stroke-width="4" stroke-linecap="round"/>
        <path d="M 3 18 A 15 15 0 0 1 10 6"  fill="none" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
        <path d="M 10 6 A 15 15 0 0 1 18 3"  fill="none" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>
        <path d="M 18 3 A 15 15 0 0 1 29 9"  fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
        <line x1="18" y1="18" x2="27" y2="8" stroke="#e3b341" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="18" cy="18" r="2.5" fill="#e3b341"/>
        <circle cx="18" cy="18" r="1.2" fill="#060b14"/>
      </svg>
      <span class="fg-num">71</span>
      <span class="fg-lbl">贪婪 · 温度计 →</span>
    </a>
  </div>
</div>

<div class="chart-area">
  <svg id="chart" viewBox="0 0 960 640" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- TR gold glow -->
      <radialGradient id="tr-g" cx="100%" cy="0%" r="65%" gradientUnits="userSpaceOnUse"
        x1="480" y1="48" x2="860" y2="48">
        <stop offset="0%"   stop-color="#e3b341" stop-opacity="0.16"/>
        <stop offset="55%"  stop-color="#f59e0b" stop-opacity="0.06"/>
        <stop offset="100%" stop-color="#e3b341" stop-opacity="0"/>
      </radialGradient>
      <!-- TL blue tint -->
      <linearGradient id="tl-g" x1="100%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%"   stop-color="#4c9ef0" stop-opacity="0.03"/>
        <stop offset="100%" stop-color="#4c9ef0" stop-opacity="0.09"/>
      </linearGradient>
      <!-- BR red tint -->
      <radialGradient id="br-g" cx="0%" cy="0%" r="70%"
        gradientUnits="userSpaceOnUse" x1="480" y1="332" x2="860" y2="332">
        <stop offset="0%"   stop-color="#f85149" stop-opacity="0.09"/>
        <stop offset="100%" stop-color="#f85149" stop-opacity="0.01"/>
      </radialGradient>
      <!-- Gold glow filter -->
      <filter id="gf" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- QUADRANT FILLS -->
    <rect x="96" y="48" width="384" height="284" fill="#050810" fill-opacity="0.8"/>
    <rect x="96" y="48" width="384" height="284" fill="url(#tl-g)"/>
    <rect x="480" y="48" width="384" height="284" fill="#0c1828"/>
    <rect x="480" y="48" width="384" height="284" fill="url(#tr-g)"/>
    <rect x="480" y="332" width="384" height="272" fill="url(#br-g)"/>

    <!-- Gold sparkles in TR -->
    <g opacity="0.55">
      <circle cx="720" cy="80"  r="1.6" fill="#e3b341"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="775" cy="115" r="1.2" fill="#f5c843"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
      <circle cx="820" cy="82"  r="0.9" fill="#e3b341"><animate attributeName="opacity" values="0.5;1.0;0.5" dur="1.7s" repeatCount="indefinite"/></circle>
      <circle cx="685" cy="130" r="1.4" fill="#f5c843"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="840" cy="170" r="1.0" fill="#e3b341"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="62"  r="1.3" fill="#e3b341"><animate attributeName="opacity" values="0.4;0.85;0.4" dur="1.9s" repeatCount="indefinite"/></circle>
    </g>

    <!-- TL pulsing border -->
    <rect x="98" y="50" width="380" height="280"
      fill="none" stroke="#4c9ef0" stroke-width="1.2"
      stroke-dasharray="9 5" class="tl-dash"/>

    <!-- BR danger brackets -->
    <g stroke="#f85149" stroke-width="1.5" opacity="0.4">
      <path d="M480 332 l16 0 M480 332 l0 16"/>
      <path d="M864 332 l-16 0 M864 332 l0 16"/>
      <path d="M480 604 l16 0 M480 604 l0 -16"/>
      <path d="M864 604 l-16 0 M864 604 l0 -16"/>
    </g>

    <!-- AXES -->
    <line x1="96" y1="332" x2="864" y2="332" stroke="#1e3050" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="480" y1="48"  x2="480" y2="604" stroke="#1e3050" stroke-width="1.2" stroke-dasharray="4 3"/>

    <!-- QUADRANT LABELS -->
    <text x="288" y="90" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="16" font-weight="900" fill="#4c9ef0" fill-opacity="0.82">踏进光里</text>
    <text x="288" y="108" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="10" fill="#4c9ef0" fill-opacity="0.38">机构加仓 · 散户未跟 · 布局窗口</text>

    <text x="672" y="90" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="18" font-weight="900" fill="#e3b341" filter="url(#gf)">站在光里</text>
    <text x="672" y="110" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="10" fill="#e3b341" fill-opacity="0.42">机构+散户共振 · 主升浪</text>

    <text x="288" y="580" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="14" font-weight="800" fill="#364555">光着站在那里</text>
    <text x="288" y="597" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="9.5" fill="#364555">双向撤退 · 资金真空</text>

    <text x="672" y="580" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="15" font-weight="900" fill="#f85149" fill-opacity="0.82">别光站在那里</text>
    <text x="672" y="597" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="9.5" fill="#f85149" fill-opacity="0.42">机构出货 · 散户追涨</text>

    <!-- AXIS LABELS -->
    <text x="60" y="190" text-anchor="middle"
      font-family="Microsoft YaHei,PingFang SC,sans-serif"
      font-size="10" fill="#2a3a4a"
      transform="rotate(-90,60,190)">机构资金变化</text>
    <text x="66" y="70"  text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#2a3a4a">买入↑</text>
    <text x="66" y="596" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#2a3a4a">减仓↓</text>
    <text x="192" y="628" text-anchor="middle" font-family="Microsoft YaHei,PingFang SC,sans-serif" font-size="9.5" fill="#2a3a4a">← 散户减仓</text>
    <text x="480" y="628" text-anchor="middle" font-family="Microsoft YaHei,PingFang SC,sans-serif" font-size="9.5" fill="#2a3a4a">散户资金变化</text>
    <text x="768" y="628" text-anchor="middle" font-family="Microsoft YaHei,PingFang SC,sans-serif" font-size="9.5" fill="#2a3a4a">散户加仓 →</text>

    <g id="bubbles"></g>
  </svg>
</div>

<div class="ft">
  <div class="ft-legend" id="legend"></div>
  <div class="ft-note">气泡 = 成交量 &nbsp;·&nbsp; 箭头 = 5日方向 &nbsp;·&nbsp; 仅供参考，不构成投资建议 &nbsp;·&nbsp; © Asymmetric IM</div>
</div>

<script>
const SECTORS = [
  { name:'大金融',    x:0.28, y:0.36, dx:0.09, dy:0.13, vol:1.8, ret5d:1.2,  color:'#4c9ef0' },
  { name:'新能源车',  x:0.20, y:0.22, dx:0.06, dy:0.08, vol:1.3, ret5d:3.2,  color:'#3fb950' },
  { name:'AI算力',   x:-0.16,y:0.32, dx:0.00, dy:0.15, vol:1.5, ret5d:7.8,  color:'#f0883e' },
  { name:'消费白酒',  x:-0.12,y:0.16, dx:-0.02,dy:0.07, vol:1.0, ret5d:1.8,  color:'#e3b341' },
  { name:'创新药',    x:-0.08,y:0.12, dx:-0.02,dy:0.05, vol:0.9, ret5d:0.9,  color:'#bc8cff' },
  { name:'半导体',    x:0.34, y:-0.10,dx:0.13, dy:-0.06,vol:1.4, ret5d:4.5,  color:'#58a6ff' },
  { name:'电力设备',  x:0.14, y:-0.17,dx:0.06, dy:-0.09,vol:0.9, ret5d:2.1,  color:'#56d364' },
  { name:'光伏储能',  x:-0.20,y:-0.22,dx:-0.09,dy:-0.09,vol:0.7, ret5d:-1.2, color:'#ffa657' },
  { name:'传媒互联网',x:-0.14,y:-0.27,dx:-0.06,dy:-0.11,vol:0.6, ret5d:-2.9, color:'#ff7b6b' },
  { name:'地产链',    x:-0.08,y:-0.33,dx:-0.02,dy:-0.09,vol:0.5, ret5d:-3.5, color:'#f85149' },
];

// Coordinate transform
const VB = { l:96, r:864, t:48, b:604 };
const XR = 0.54, YR = 0.48;
function toSVG(dx, dy) {
  return {
    x: VB.l + (dx + XR) / (2*XR) * (VB.r - VB.l),
    y: VB.t + (1 - (dy + YR) / (2*YR)) * (VB.b - VB.t),
  };
}

const svgEl  = document.getElementById('chart');
const defs   = svgEl.querySelector('defs');
const layer  = document.getElementById('bubbles');

SECTORS.forEach((s, i) => {
  // Arrow marker
  const mk  = document.createElementNS('http://www.w3.org/2000/svg','marker');
  const mid = 'a' + i;
  mk.setAttribute('id', mid);
  mk.setAttribute('markerWidth','7'); mk.setAttribute('markerHeight','7');
  mk.setAttribute('refX','6'); mk.setAttribute('refY','3');
  mk.setAttribute('orient','auto');
  const mkp = document.createElementNS('http://www.w3.org/2000/svg','path');
  mkp.setAttribute('d','M 0 0 L 7 3 L 0 6 Z');
  mkp.setAttribute('fill', s.color); mkp.setAttribute('opacity','0.7');
  mk.appendChild(mkp); defs.appendChild(mk);

  const cur = toSVG(s.x, s.y);
  const old = toSVG(s.x - s.dx, s.y - s.dy);
  const r   = 18 + s.vol * 12;
  const g   = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','s-bubble');

  // Ghost
  const ghost = document.createElementNS('http://www.w3.org/2000/svg','circle');
  ghost.setAttribute('cx', old.x); ghost.setAttribute('cy', old.y);
  ghost.setAttribute('r', r * 0.3);
  ghost.setAttribute('fill', s.color); ghost.setAttribute('fill-opacity','0.15');
  g.appendChild(ghost);

  // Trajectory
  const dist = Math.hypot(cur.x-old.x, cur.y-old.y);
  if (dist > 4) {
    const shrink = r + 4;
    const t1 = 0.18, t2 = Math.max(0, (dist - shrink) / dist);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', old.x + (cur.x-old.x)*t1);
    line.setAttribute('y1', old.y + (cur.y-old.y)*t1);
    line.setAttribute('x2', old.x + (cur.x-old.x)*t2);
    line.setAttribute('y2', old.y + (cur.y-old.y)*t2);
    line.setAttribute('stroke', s.color);
    line.setAttribute('stroke-width','1.6');
    line.setAttribute('stroke-opacity','0.5');
    line.setAttribute('marker-end','url(#'+mid+')');
    g.appendChild(line);
  }

  // Glow ring
  const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
  glow.setAttribute('cx', cur.x); glow.setAttribute('cy', cur.y);
  glow.setAttribute('r', r * 1.5);
  glow.setAttribute('fill', s.color); glow.setAttribute('fill-opacity','0.07');
  g.appendChild(glow);

  // Bubble
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx', cur.x); c.setAttribute('cy', cur.y); c.setAttribute('r', r);
  c.setAttribute('fill', s.color); c.setAttribute('fill-opacity','0.88');
  c.setAttribute('stroke', s.color); c.setAttribute('stroke-width','2');
  g.appendChild(c);

  // Name
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', cur.x); txt.setAttribute('y', cur.y + 4);
  txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
  txt.setAttribute('font-family','Microsoft YaHei,PingFang SC,sans-serif');
  txt.setAttribute('font-size', r > 28 ? '11' : '10');
  txt.setAttribute('font-weight','800');
  txt.setAttribute('fill','#fff'); txt.setAttribute('fill-opacity','0.95');
  txt.setAttribute('pointer-events','none');
  txt.textContent = s.name;
  g.appendChild(txt);

  // Return
  const ret = document.createElementNS('http://www.w3.org/2000/svg','text');
  ret.setAttribute('x', cur.x); ret.setAttribute('y', cur.y + r + 13);
  ret.setAttribute('text-anchor','middle');
  ret.setAttribute('font-family','Microsoft YaHei,PingFang SC,sans-serif');
  ret.setAttribute('font-size','9'); ret.setAttribute('font-weight','700');
  ret.setAttribute('fill', s.ret5d >= 0 ? '#3fb950' : '#f85149');
  ret.setAttribute('pointer-events','none');
  ret.textContent = (s.ret5d >= 0 ? '+' : '') + s.ret5d + '%';
  g.appendChild(ret);

  layer.appendChild(g);
});

// Legend
const legEl = document.getElementById('legend');
SECTORS.forEach(s => {
  const d = document.createElement('div');
  d.className = 'leg';
  d.innerHTML = `<div class="leg-dot" style="background:${s.color}"></div>${s.name}`;
  legEl.appendChild(d);
});
</script>
</body>
</html>
